<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Место</title>
</head>

<body class="page">
  <header class="header">
    <img class="header__logo" src="./images/logo.svg" alt="логотип">
  </header>
  <section class="profile">
    <img class="profile__avatar" src="./images/profile.jpg" alt="фото профиля">
    <div class="profile__info">
      <div class="profile__name-edit">
        <h1 class="profile__name">Жак-Ив Кусто</h1>
        <button class="edit-button button-hover">
          <img class="edit-button__image" src="./images/pen.png" alt="Редактировать">
        </button>
      </div>
      <p class="profile__text">Исследователь океана</p>
    </div>
    <button class="add-button button-hover">
      <img class="add-button__image" src="./images/plus.png" alt="Добавить">
    </button>
  </section>
  <section class="elements">
    <div class="element">
      <img class="element__image" src="./images/kirill-pershin-1088404-unsplash.jpg" alt="Замок">
      <div class="element__info">
        <p class="element__name">Карачаевск</p>
        <button class="element__like-button">
        </button>
      </div>
    </div>
    <div class="element">
      <img class="element__image" src="./images/kirill-pershin-1404681-unsplash.jpg" alt="Эльбрус">
      <div class="element__info">
        <p class="element__name">Гора Эльбрус</p>
        <a class="element__like-button" href="#">
        </a>
      </div>
    </div>
    <div class="element">
      <img class="element__image" src="./images/kirill-pershin-1556355-unsplash.jpg" alt="горы">
      <div class="element__info">
        <p class="element__name">Домбай</p>
        <a class="element__like-button" href="#">
        </a>
      </div>
    </div>
    <div class="element">
      <img class="element__image" src="./images/kirill-pershin-1404681-unsplash.jpg" alt="Эльбрус">
      <div class="element__info">
        <p class="element__name">Гора Эльбрус</p>
        <a class="element__like-button" href="#">
        </a>
      </div>
    </div>
    <div class="element">
      <img class="element__image" src="./images/kirill-pershin-1556355-unsplash.jpg" alt="горы">
      <div class="element__info">
        <p class="element__name">Домбай</p>
        <a class="element__like-button" href="#">
        </a>
      </div>
    </div>
    <div class="element">
      <img class="element__image" src="./images/kirill-pershin-1088404-unsplash.jpg" alt="Замок">
      <div class="element__info">
        <p class="element__name">Карачаевск</p>
        <a class="element__like-button" href="#">
        </a>
      </div>
    </div>
  </section>
  <footer class="footer">
    <p class="footer__copyright">&copy; 2020 Mesto Russia</p>
  </footer>
  <div class="popup">
    <div class="popup__container">
      <button class="popup__close-button button-hover">
        <img class="popup__close-image" src="./images/close-icon.png" alt="закрыть">
      </button>
      <label class="popup__label">Редактировать профиль</label>
      <input class="popup__field" type="text" placeholder="Жак-Ив Кусто">
      <input class="popup__field" type="text" placeholder="Исследователь океана">
      <button class="popup__save-button" type="submit">Сохранить</button>
    </div>
  </div>
</body>

</html>
